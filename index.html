<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="קול־דורות — הקליטו סיפורים משפחתיים בעברית. התמלול קורה לבד, הסיפור נשאר לנכדים." />
    <meta name="theme-color" content="#1A1714" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Suez+One&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Assistant:wght@200;300;400;500;600;700&family=Noto+Sans+Hebrew:wght@300;400;500;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>קול־דורות · הקול של משפחה לא שוכח</title>

    <script>
      // Prevent theme flash
      (function () {
        try {
          var t = localStorage.getItem('kd-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = t === 'dark' || (!t && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
